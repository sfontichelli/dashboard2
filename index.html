<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aliafor · Dashboard Presupuesto</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
<div class="brand">
<img src="public/aliafor-logo.png" alt="Aliafor" onerror="this.style.display='none'">
<h1>Dashboard Presupuesto Marketing</h1>
</div>

<div class="actions">
<button id="btnExport">Exportar CSV</button>
<button id="btnAdd">Input Nuevo Mes</button>
</div>
</header>

<main class="container">

<section class="cards">
<div class="card"><div class="label">Budget anual</div><div id="budgetTotal" class="value">—</div></div>
<div class="card"><div class="label">Gastado YTD</div><div id="ytdTotal" class="value">—</div></div>
<div class="card"><div class="label">Disponible</div><div id="availableTotal" class="value">—</div></div>
<div class="card"><div class="label">% cumplimiento</div><div id="pctTotal" class="value">—</div></div>
<div class="card"><div class="label">Forecast*</div><div id="forecastTotal" class="value">—</div></div>
</section>

<section class="tableWrap">
<table id="budgetTable">
<thead>
<tr>
<th>Área</th>
<th>Categoría</th>
<th>Jul</th>
<th>Ago</th>
<th>Sep</th>
<th>Oct</th>
<th>Nov</th>
<th>Dic</th>
<th>YTD</th>
<th>Budget</th>
<th>%</th>
<th>Forecast</th>
</tr>
</thead>
<tbody></tbody>
</table>
<p class="note">*Forecast = (YTD / meses con gasto) × 12</p>
</section>

</main>

<div id="modal" class="modal hidden">
<div class="modalCard">
<h3>Input nuevo mes</h3>

<label>Mes
<select id="monthSelect">
<option>Jul</option>
<option>Ago</option>
<option>Sep</option>
<option>Oct</option>
<option>Nov</option>
<option>Dic</option>
</select>
</label>

<label>Categoría
<select id="catSelect"></select>
</label>

<label>Monto
<input id="amountInput" type="number" placeholder="0">
</label>

<div class="modalActions">
<button id="btnCancel">Cancelar</button>
<button id="btnSave">Guardar</button>
</div>

</div>
</div>

<script src="app.js"></script>

</body>
</html>
